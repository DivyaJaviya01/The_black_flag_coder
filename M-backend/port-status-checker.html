<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Development Ports Status Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(52, 152, 219, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
        }

        .btn-danger {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%);
            box-shadow: 0 4px 15px rgba(149, 165, 166, 0.3);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-left: 5px solid #3498db;
        }

        .stat-number {
            font-size: 3em;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #7f8c8d;
            font-size: 1.1em;
            font-weight: 600;
        }

        .ports-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .port-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-left: 5px solid #ddd;
            transition: all 0.3s ease;
        }

        .port-card.checking {
            border-left-color: #f39c12;
            background: linear-gradient(135deg, #fef9e7 0%, #fcf3cf 100%);
            transform: scale(1.02);
        }

        .port-card.open {
            border-left-color: #27ae60;
            background: linear-gradient(135deg, #d5f4e6 0%, #a3e4d7 100%);
        }

        .port-card.closed {
            border-left-color: #e74c3c;
            background: linear-gradient(135deg, #fdf2f2 0%, #fadbd8 100%);
        }

        .port-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .port-number {
            font-size: 1.8em;
            font-weight: bold;
            color: #2c3e50;
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-checking {
            background: #f39c12;
            color: white;
        }

        .status-open {
            background: #27ae60;
            color: white;
        }

        .status-closed {
            background: #e74c3c;
            color: white;
        }

        .port-details {
            color: #555;
            line-height: 1.6;
        }

        .service-name {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .response-time {
            font-size: 0.9em;
            color: #7f8c8d;
            margin-top: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #ecf0f1;
            border-radius: 3px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3498db, #2980b9);
            width: 0%;
            transition: width 0.3s;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                max-width: 300px;
            }
            
            .ports-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Development Ports Monitor</h1>
            <p>Real-time status monitoring for all development server ports</p>
        </div>

        <div class="content">
            <div class="controls">
                <button class="btn" onclick="checkAllPorts()">
                    <span id="checkAllText">🔍 Check All Ports</span>
                </button>
                <button class="btn btn-success" onclick="startAutoCheck()">
                    ⚡ Start Auto-Check (5s)
                </button>
                <button class="btn btn-danger" onclick="stopAutoCheck()">
                    ⏹️ Stop Auto-Check
                </button>
                <button class="btn btn-secondary" onclick="clearResults()">
                    🗑️ Clear Results
                </button>
            </div>

            <div class="progress-bar hidden" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalPorts">11</div>
                    <div class="stat-label">Total Ports</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="openPorts">0</div>
                    <div class="stat-label">Open Ports</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="closedPorts">0</div>
                    <div class="stat-label">Closed Ports</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="lastCheck">Never</div>
                    <div class="stat-label">Last Check</div>
                </div>
            </div>

            <div class="ports-grid" id="portsGrid">
                <!-- Ports will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <script>
        // Development ports configuration
        const DEVELOPMENT_PORTS = [
            { port: 3000, name: 'Node.js/React Dev', description: 'Primary development server' },
            { port: 3001, name: 'Backend API', description: 'Express.js API server' },
            { port: 3002, name: 'Secondary Dev', description: 'Alternative development server' },
            { port: 3003, name: 'Third Dev Server', description: 'Additional development port' },
            { port: 4000, name: 'Web Server', description: 'Alternative web server' },
            { port: 5000, name: 'Express API', description: 'Common Express.js port' },
            { port: 5173, name: 'Vite Dev Server', description: 'Vite development (default)' },
            { port: 5174, name: 'Vite Alt Server', description: 'Vite development (alternative)' },
            { port: 8000, name: 'HTTP Server', description: 'Standard HTTP server' },
            { port: 8001, name: 'Alt HTTP Server', description: 'Alternative HTTP server' },
            { port: 8080, name: 'Spring/Tomcat', description: 'Spring Boot or Tomcat server' }
        ];

        let isChecking = false;
        let autoCheckInterval = null;
        let portResults = {};

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            createPortCards();
            updateStats();
        });

        // Create port cards
        function createPortCards() {
            const grid = document.getElementById('portsGrid');
            grid.innerHTML = '';
            
            DEVELOPMENT_PORTS.forEach(portConfig => {
                const card = document.createElement('div');
                card.className = 'port-card';
                card.id = `port-${portConfig.port}`;
                
                card.innerHTML = `
                    <div class="port-header">
                        <div class="port-number">:${portConfig.port}</div>
                        <div class="status-badge" id="status-${portConfig.port}">Unknown</div>
                    </div>
                    <div class="port-details">
                        <div class="service-name">${portConfig.name}</div>
                        <div>${portConfig.description}</div>
                        <div class="response-time" id="time-${portConfig.port}"></div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        // Check all ports
        async function checkAllPorts() {
            if (isChecking) return;
            
            isChecking = true;
            const checkAllBtn = document.getElementById('checkAllText');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            
            checkAllBtn.innerHTML = '<span class="loading-spinner"></span>Checking...';
            progressBar.classList.remove('hidden');
            progressFill.style.width = '0%';
            
            let completedChecks = 0;
            const totalPorts = DEVELOPMENT_PORTS.length;
            
            // Check all ports concurrently
            const promises = DEVELOPMENT_PORTS.map(async (portConfig, index) => {
                const result = await checkPort('localhost', portConfig.port);
                portResults[portConfig.port] = result;
                updatePortCard(portConfig.port, result);
                
                completedChecks++;
                const progress = (completedChecks / totalPorts) * 100;
                progressFill.style.width = progress + '%';
                
                return result;
            });
            
            await Promise.all(promises);
            
            updateStats();
            document.getElementById('lastCheck').textContent = new Date().toLocaleTimeString();
            
            checkAllBtn.innerHTML = '🔍 Check All Ports';
            progressBar.classList.add('hidden');
            isChecking = false;
        }

        // Check individual port
        async function checkPort(host, port) {
            const startTime = Date.now();
            
            try {
                // Update UI to show checking state
                const card = document.getElementById(`port-${port}`);
                const status = document.getElementById(`status-${port}`);
                
                card.className = 'port-card checking';
                status.className = 'status-badge status-checking';
                status.textContent = 'Checking...';
                
                // Try WebSocket connection first
                const wsResult = await testWebSocket(host, port);
                if (wsResult.success) {
                    return {
                        success: true,
                        method: 'WebSocket',
                        responseTime: Date.now() - startTime,
                        message: 'Port is open and accepting connections'
                    };
                }
                
                // Fallback to HTTP test
                const httpResult = await testHttp(host, port);
                return {
                    success: httpResult.success,
                    method: httpResult.success ? 'HTTP' : 'Failed',
                    responseTime: Date.now() - startTime,
                    message: httpResult.message
                };
                
            } catch (error) {
                return {
                    success: false,
                    method: 'Error',
                    responseTime: Date.now() - startTime,
                    message: error.message
                };
            }
        }

        // Test WebSocket connection
        function testWebSocket(host, port) {
            return new Promise((resolve) => {
                const timeout = 3000;
                const ws = new WebSocket(`ws://${host}:${port}`);
                
                let resolved = false;
                
                const cleanup = () => {
                    if (!resolved) {
                        resolved = true;
                        try { ws.close(); } catch (e) {}
                    }
                };
                
                ws.onopen = () => {
                    cleanup();
                    resolve({ success: true, message: 'WebSocket connection successful' });
                };
                
                ws.onerror = () => {
                    cleanup();
                    resolve({ success: false, message: 'WebSocket connection failed' });
                };
                
                ws.onclose = () => {
                    cleanup();
                    resolve({ success: false, message: 'WebSocket connection closed' });
                };
                
                setTimeout(() => {
                    cleanup();
                    if (!resolved) {
                        resolved = true;
                        resolve({ success: false, message: 'WebSocket timeout' });
                    }
                }, timeout);
            });
        }

        // Test HTTP connection
        async function testHttp(host, port) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000);
                
                const response = await fetch(`http://${host}:${port}`, {
                    method: 'HEAD',
                    mode: 'no-cors',
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                return { success: true, message: 'HTTP connection successful' };
                
            } catch (error) {
                if (error.name === 'TypeError' && error.message.includes('fetch')) {
                    return { success: true, message: 'Port open (CORS blocked)' };
                }
                return { success: false, message: 'HTTP connection failed' };
            }
        }

        // Update port card display
        function updatePortCard(port, result) {
            const card = document.getElementById(`port-${port}`);
            const status = document.getElementById(`status-${port}`);
            const timeElement = document.getElementById(`time-${port}`);
            
            if (result.success) {
                card.className = 'port-card open';
                status.className = 'status-badge status-open';
                status.textContent = 'Open';
                timeElement.textContent = `${result.method} • ${result.responseTime}ms • ${result.message}`;
            } else {
                card.className = 'port-card closed';
                status.className = 'status-badge status-closed';
                status.textContent = 'Closed';
                timeElement.textContent = `${result.method} • ${result.responseTime}ms • ${result.message}`;
            }
        }

        // Update statistics
        function updateStats() {
            const openCount = Object.values(portResults).filter(r => r.success).length;
            const closedCount = Object.values(portResults).filter(r => !r.success).length;
            
            document.getElementById('openPorts').textContent = openCount;
            document.getElementById('closedPorts').textContent = closedCount;
        }

        // Start auto-check
        function startAutoCheck() {
            if (autoCheckInterval) return;
            
            autoCheckInterval = setInterval(checkAllPorts, 5000);
            console.log('✅ Auto-check started (every 5 seconds)');
            
            // Initial check
            checkAllPorts();
        }

        // Stop auto-check
        function stopAutoCheck() {
            if (autoCheckInterval) {
                clearInterval(autoCheckInterval);
                autoCheckInterval = null;
                console.log('⏹️ Auto-check stopped');
            }
        }

        // Clear results
        function clearResults() {
            stopAutoCheck();
            portResults = {};
            
            DEVELOPMENT_PORTS.forEach(portConfig => {
                const card = document.getElementById(`port-${portConfig.port}`);
                const status = document.getElementById(`status-${portConfig.port}`);
                const timeElement = document.getElementById(`time-${portConfig.port}`);
                
                card.className = 'port-card';
                status.className = 'status-badge';
                status.textContent = 'Unknown';
                timeElement.textContent = '';
            });
            
            document.getElementById('openPorts').textContent = '0';
            document.getElementById('closedPorts').textContent = '0';
            document.getElementById('lastCheck').textContent = 'Never';
        }
    </script>
</body>
</html>
