<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MongoDB College Data Explorer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      line-height: 1.6;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .header {
      background: rgba(255, 255, 255, 0.95);
      padding: 30px;
      border-radius: 15px;
      margin-bottom: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    
    h1 {
      color: #2c3e50;
      font-size: 2.5em;
      margin-bottom: 10px;
      font-weight: 700;
    }
    
    .subtitle {
      color: #7f8c8d;
      font-size: 1.2em;
    }
    
    .controls {
      background: rgba(255, 255, 255, 0.95);
      padding: 25px;
      border-radius: 15px;
      margin-bottom: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }
    
    .control-group {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .control-group:last-child {
      margin-bottom: 0;
    }
    
    label {
      font-weight: 600;
      color: #2c3e50;
      min-width: 80px;
    }
    
    input, select {
      padding: 12px 15px;
      border: 2px solid #e0e6ed;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.3s ease;
      flex: 1;
      min-width: 200px;
    }
    
    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin: 5px;
    }
    
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .stats {
      background: rgba(255, 255, 255, 0.95);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
    }
    
    .stat-item {
      text-align: center;
      padding: 10px;
    }
    
    .stat-number {
      font-size: 2em;
      font-weight: bold;
      color: #667eea;
    }
    
    .stat-label {
      color: #7f8c8d;
      margin-top: 5px;
    }
    
    .data-container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      min-height: 400px;
    }
    
    .loading {
      text-align: center;
      font-style: italic;
      color: #7f8c8d;
      font-size: 1.2em;
      padding: 50px;
    }
    
    .error {
      color: #e74c3c;
      background: #fdf2f2;
      padding: 20px;
      border-radius: 8px;
      border-left: 4px solid #e74c3c;
    }
    
    .college-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    
    .college-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      border-left: 4px solid #667eea;
    }
    
    .college-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
    }
    
    .college-name {
      font-size: 1.3em;
      font-weight: bold;
      color: #2c3e50;
      margin-bottom: 10px;
    }
    
    .college-details {
      color: #7f8c8d;
      line-height: 1.8;
    }
    
    .college-details strong {
      color: #2c3e50;
    }
    
    .json-view {
      background: #f8f9fa;
      border: 1px solid #e9ecef;
      border-radius: 8px;
      padding: 20px;
      white-space: pre-wrap;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      max-height: 500px;
      overflow-y: auto;
    }
    
    @media (max-width: 768px) {
      .control-group {
        flex-direction: column;
        align-items: stretch;
      }
      
      input, select {
        min-width: auto;
      }
      
      .college-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎓 College Data Explorer</h1>
      <p class="subtitle">Explore college data from MongoDB Atlas</p>
    </div>
    
    <div class="controls">
      <div class="control-group">
        <label for="search">Search:</label>
        <input type="text" id="search" placeholder="Search colleges or locations...">
        
        <label for="location-filter">Location:</label>
        <select id="location-filter">
          <option value="">All Locations</option>
        </select>
        
        <label for="limit">Limit:</label>
        <select id="limit">
          <option value="">All</option>
          <option value="10">10</option>
          <option value="25">25</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
      </div>
      
      <div class="control-group">
        <label for="sort-by">Sort by:</label>
        <select id="sort-by">
          <option value="">Default</option>
          <option value="name">College Name</option>
          <option value="location">Location</option>
        </select>
        
        <label for="sort-order">Order:</label>
        <select id="sort-order">
          <option value="asc">Ascending</option>
          <option value="desc">Descending</option>
        </select>
        
        <button onclick="loadData()">Search</button>
        <button onclick="clearFilters()">Clear</button>
        <button onclick="toggleView()">Toggle View</button>
      </div>
    </div>
    
    <div class="stats" id="stats" style="display: none;">
      <div class="stat-item">
        <div class="stat-number" id="total-count">0</div>
        <div class="stat-label">Total Results</div>
      </div>
      <div class="stat-item">
        <div class="stat-number" id="location-count">0</div>
        <div class="stat-label">Locations</div>
      </div>
    </div>
    
    <div class="data-container" id="data-container">
      <p class="loading">Click "Search" to load data from the server...</p>
    </div>
  </div>

  <script>
    let currentData = [];
    let allLocations = [];
    let viewMode = 'cards'; // 'cards' or 'json'
    
    document.addEventListener('DOMContentLoaded', () => {
      loadLocations();
      
      // Add enter key support for search
      document.getElementById('search').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          loadData();
        }
      });
    });
    
    async function loadLocations() {
      try {
        const response = await fetch('http://localhost:3001/api/colleges/locations');
        if (!response.ok) throw new Error('Failed to load locations');
        
        const result = await response.json();
        if (result.success) {
          allLocations = result.data;
          const locationSelect = document.getElementById('location-filter');
          
          result.data.forEach(location => {
            const option = document.createElement('option');
            option.value = location;
            option.textContent = location;
            locationSelect.appendChild(option);
          });
        }
      } catch (error) {
        console.error('Error loading locations:', error);
      }
    }
    
    async function loadData() {
      const dataContainer = document.getElementById('data-container');
      const statsContainer = document.getElementById('stats');
      
      // Show loading state
      dataContainer.innerHTML = '<p class="loading">Loading data from the server...</p>';
      statsContainer.style.display = 'none';
      
      try {
        // Build query parameters
        const params = new URLSearchParams();
        
        const search = document.getElementById('search').value.trim();
        const locationFilter = document.getElementById('location-filter').value;
        const limit = document.getElementById('limit').value;
        const sortBy = document.getElementById('sort-by').value;
        const sortOrder = document.getElementById('sort-order').value;
        
        if (search) params.append('search', search);
        if (limit) params.append('limit', limit);
        if (sortBy) params.append('sortBy', sortBy);
        if (sortOrder && sortBy) params.append('sortOrder', sortOrder);
        
        // Choose endpoint based on filters
        let url = 'http://localhost:3001/api/data';
        if (locationFilter && !search) {
          url = `http://localhost:3001/api/colleges/location/${encodeURIComponent(locationFilter)}`;
        } else if (params.toString()) {
          url += '?' + params.toString();
        }
        
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const result = await response.json();
        
        if (result.success) {
          currentData = result.data;
          displayData(result);
          updateStats(result);
        } else {
          throw new Error(result.message || 'Failed to fetch data');
        }
        
      } catch (error) {
        console.error('Error fetching data:', error);
        dataContainer.innerHTML = `
          <div class="error">
            <strong>Failed to load data!</strong><br>
            ${error.message}<br>
            <small>Make sure the backend server is running on http://localhost:3001</small>
          </div>
        `;
      }
    }
    
    function displayData(result) {
      const dataContainer = document.getElementById('data-container');
      
      if (viewMode === 'json') {
        dataContainer.innerHTML = `
          <h3>JSON Data (${result.count} records)</h3>
          <div class="json-view">${JSON.stringify(result, null, 2)}</div>
        `;
      } else {
        if (result.data.length === 0) {
          dataContainer.innerHTML = '<p class="loading">No colleges found matching your criteria.</p>';
          return;
        }
        
        const cardsHtml = result.data.map(college => `
          <div class="college-card">
            <div class="college-name">${college['name'] || 'N/A'}</div>
            <div class="college-details">
              <strong>Location:</strong> ${college['location'] || 'N/A'}<br>
              ${college['website'] ? `<strong>Website:</strong> <a href="${college['website']}" target="_blank">${college['website']}</a><br>` : ''}
              ${college['courses'] && college['courses'].length > 0 ? `<strong>Courses:</strong> ${college['courses'].slice(0, 3).join(', ')}${college['courses'].length > 3 ? '...' : ''}<br>` : ''}
            </div>
          </div>
        `).join('');
        
        dataContainer.innerHTML = `
          <h3>College Results (${result.count} found)</h3>
          <div class="college-grid">${cardsHtml}</div>
        `;
      }
    }
    
    function updateStats(result) {
      const statsContainer = document.getElementById('stats');
      const totalCount = document.getElementById('total-count');
      const locationCount = document.getElementById('location-count');
      
      totalCount.textContent = result.count;
      
      // Count unique locations in current results
      const uniqueLocations = new Set(result.data.map(college => college['location']).filter(Boolean));
      locationCount.textContent = uniqueLocations.size;
      
      statsContainer.style.display = 'flex';
    }
    
    function clearFilters() {
      document.getElementById('search').value = '';
      document.getElementById('location-filter').value = '';
      document.getElementById('limit').value = '';
      document.getElementById('sort-by').value = '';
      document.getElementById('sort-order').value = 'asc';
      
      const dataContainer = document.getElementById('data-container');
      const statsContainer = document.getElementById('stats');
      dataContainer.innerHTML = '<p class="loading">Click "Search" to load data from the server...</p>';
      statsContainer.style.display = 'none';
    }
    
    function toggleView() {
      viewMode = viewMode === 'cards' ? 'json' : 'cards';
      if (currentData.length > 0) {
        displayData({ data: currentData, count: currentData.length, success: true });
      }
    }
  </script>
</body>
</html>
