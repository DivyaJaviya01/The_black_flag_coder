<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORS Test from Frontend</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #cce7ff; color: #004085; }
    </style>
</head>
<body>
    <h1>🧪 CORS Test from Frontend Origin</h1>
    <div id="results"></div>

    <script>
        const results = document.getElementById('results');
        
        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = message;
            results.appendChild(div);
        }

        async function testCORS() {
            addResult(`🚀 Testing from origin: ${window.location.origin}`);
            
            try {
                // Test 1: Health check
                addResult('📡 Testing /api/health...');
                const healthResponse = await fetch('http://localhost:3001/api/health');
                
                if (healthResponse.ok) {
                    const healthData = await healthResponse.json();
                    addResult(`✅ Health Check: ${JSON.stringify(healthData)}`, 'success');
                } else {
                    addResult(`❌ Health Check failed: ${healthResponse.status}`, 'error');
                }
                
                // Test 2: Collections
                addResult('📡 Testing /api/collections...');
                const collectionsResponse = await fetch('http://localhost:3001/api/collections');
                
                if (collectionsResponse.ok) {
                    const collectionsData = await collectionsResponse.json();
                    addResult(`✅ Collections: Found ${collectionsData.count} collections`, 'success');
                } else {
                    addResult(`❌ Collections failed: ${collectionsResponse.status}`, 'error');
                }
                
                // Test 3: Colleges API
                addResult('📡 Testing /api/colleges...');
                const collegesResponse = await fetch('http://localhost:3001/api/colleges?limit=2');
                
                console.log('Full response object:', collegesResponse);
                console.log('Response headers:', [...collegesResponse.headers.entries()]);
                
                if (collegesResponse.ok) {
                    const collegesData = await collegesResponse.json();
                    addResult(`✅ Colleges API: Success! Got ${collegesData.count} colleges`, 'success');
                    addResult(`📊 Sample data: ${JSON.stringify(collegesData.colleges[0]?.name || 'No data')}`, 'info');
                } else {
                    addResult(`❌ Colleges API failed: ${collegesResponse.status} ${collegesResponse.statusText}`, 'error');
                }
                
            } catch (error) {
                addResult(`❌ Network Error: ${error.message}`, 'error');
                console.error('Full error:', error);
            }
        }

        // Run test when page loads
        testCORS();
    </script>
</body>
</html>
