<!DOCTYPE html>
<html>
<head>
    <title>Collection Test</title>
</head>
<body>
    <h1>Collection Discovery Test</h1>
    <button onclick="testCollections()">Test Collections API</button>
    <button onclick="testVishalCollection()">Test Vishal Collection API</button>
    <div id="result"></div>
    
    <script>
        async function testCollections() {
            try {
                const response = await fetch('http://localhost:3001/api/collections');
                const data = await response.json();
                document.getElementById('result').innerHTML = `
                    <h3>Collections API Result:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `Error: ${error.message}`;
            }
        }
        
        async function testVishalCollection() {
            try {
                const response = await fetch('http://localhost:3001/api/collection/vishal?limit=2');
                const data = await response.json();
                document.getElementById('result').innerHTML = `
                    <h3>Vishal Collection API Result:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `Error: ${error.message}`;
            }
        }
    </script>
</body>
</html>
