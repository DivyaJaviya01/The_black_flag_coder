<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend-Backend Connection Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
        button { margin: 5px; padding: 10px 15px; cursor: pointer; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 3px; overflow-x: auto; max-height: 400px; }
    </style>
</head>
<body>
    <h1>Frontend-Backend Connection Test</h1>
    <p><strong>Current URL:</strong> <span id="current-url"></span></p>
    
    <div class="test-section info">
        <h3>Test Status</h3>
        <div id="status">Ready to test...</div>
    </div>

    <div class="test-section">
        <h3>Direct Backend API Test (from frontend context)</h3>
        <button onclick="testDirectBackend()">Test Direct Backend API</button>
        <div id="direct-backend"></div>
    </div>

    <div class="test-section">
        <h3>Frontend Proxy Test (if configured)</h3>
        <button onclick="testFrontendProxy()">Test Frontend Proxy</button>
        <div id="frontend-proxy"></div>
    </div>

    <div class="test-section">
        <h3>CORS Test from Frontend Context</h3>
        <button onclick="testCORSFromFrontend()">Test CORS</button>
        <div id="cors-frontend"></div>
    </div>

    <div class="test-section">
        <h3>Network Information</h3>
        <div id="network-info"></div>
    </div>

    <script>
        // Display current URL
        document.getElementById('current-url').textContent = window.location.href;

        function updateStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = message;
            statusDiv.parentElement.className = `test-section ${type}`;
        }

        async function testDirectBackend() {
            const resultDiv = document.getElementById('direct-backend');
            resultDiv.innerHTML = 'Testing direct backend connection...';
            
            try {
                console.log('Testing direct backend connection from frontend context...');
                
                const response = await fetch('http://localhost:3001/api/colleges', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    mode: 'cors'
                });
                
                console.log('Response received:', response);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Data received:', data);
                
                resultDiv.innerHTML = `
                    <div class="success">
                        <h4>✅ Direct Backend Connection Successful!</h4>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Success:</strong> ${data.success}</p>
                        <p><strong>Colleges Count:</strong> ${data.count}</p>
                        <p><strong>Total Count:</strong> ${data.totalCount}</p>
                        <p><strong>CORS Headers:</strong></p>
                        <ul>
                            <li>Access-Control-Allow-Origin: ${response.headers.get('Access-Control-Allow-Origin')}</li>
                            <li>Access-Control-Allow-Credentials: ${response.headers.get('Access-Control-Allow-Credentials')}</li>
                        </ul>
                        <details>
                            <summary>View Sample Data</summary>
                            <pre>${JSON.stringify(data.colleges?.slice(0, 2), null, 2)}</pre>
                        </details>
                    </div>
                `;
                updateStatus('Direct backend connection works!', 'success');
                
            } catch (error) {
                console.error('Direct backend test error:', error);
                resultDiv.innerHTML = `
                    <div class="error">
                        <h4>❌ Direct Backend Connection Failed!</h4>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>Error Type:</strong> ${error.name}</p>
                        <p>This indicates a CORS or network issue.</p>
                    </div>
                `;
                updateStatus('Direct backend connection failed', 'error');
            }
        }

        async function testFrontendProxy() {
            const resultDiv = document.getElementById('frontend-proxy');
            resultDiv.innerHTML = 'Testing frontend proxy...';
            
            try {
                console.log('Testing frontend proxy connection...');
                
                const response = await fetch('/api/colleges', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });
                
                console.log('Proxy response received:', response);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Proxy data received:', data);
                
                resultDiv.innerHTML = `
                    <div class="success">
                        <h4>✅ Frontend Proxy Connection Successful!</h4>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>Success:</strong> ${data.success}</p>
                        <p><strong>Colleges Count:</strong> ${data.count}</p>
                        <p><strong>Total Count:</strong> ${data.totalCount}</p>
                        <details>
                            <summary>View Sample Data</summary>
                            <pre>${JSON.stringify(data.colleges?.slice(0, 2), null, 2)}</pre>
                        </details>
                    </div>
                `;
                updateStatus('Frontend proxy works!', 'success');
                
            } catch (error) {
                console.error('Frontend proxy test error:', error);
                resultDiv.innerHTML = `
                    <div class="error">
                        <h4>❌ Frontend Proxy Connection Failed!</h4>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p>This indicates the Vite proxy is not configured or working.</p>
                    </div>
                `;
                updateStatus('Frontend proxy failed', 'error');
            }
        }

        async function testCORSFromFrontend() {
            const resultDiv = document.getElementById('cors-frontend');
            resultDiv.innerHTML = 'Testing CORS from frontend context...';
            
            try {
                console.log('Testing CORS from frontend context...');
                
                const response = await fetch('http://localhost:3001/api/colleges', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    mode: 'cors',
                    credentials: 'include'
                });
                
                console.log('CORS response received:', response);
                
                const corsHeaders = {
                    'Access-Control-Allow-Origin': response.headers.get('Access-Control-Allow-Origin'),
                    'Access-Control-Allow-Credentials': response.headers.get('Access-Control-Allow-Credentials'),
                    'Vary': response.headers.get('Vary')
                };
                
                resultDiv.innerHTML = `
                    <div class="success">
                        <h4>✅ CORS Test Successful!</h4>
                        <p><strong>Status:</strong> ${response.status}</p>
                        <p><strong>CORS Headers:</strong></p>
                        <pre>${JSON.stringify(corsHeaders, null, 2)}</pre>
                        <p><strong>Current Origin:</strong> ${window.location.origin}</p>
                        <p><strong>Allowed Origins:</strong> ${corsHeaders['Access-Control-Allow-Origin']}</p>
                    </div>
                `;
                updateStatus('CORS test successful!', 'success');
                
            } catch (error) {
                console.error('CORS test error:', error);
                resultDiv.innerHTML = `
                    <div class="error">
                        <h4>❌ CORS Test Failed!</h4>
                        <p><strong>Error:</strong> ${error.message}</p>
                        <p><strong>Current Origin:</strong> ${window.location.origin}</p>
                        <p>This indicates a CORS configuration issue.</p>
                    </div>
                `;
                updateStatus('CORS test failed', 'error');
            }
        }

        // Display network information
        function displayNetworkInfo() {
            const networkDiv = document.getElementById('network-info');
            networkDiv.innerHTML = `
                <p><strong>Current URL:</strong> ${window.location.href}</p>
                <p><strong>Origin:</strong> ${window.location.origin}</p>
                <p><strong>Protocol:</strong> ${window.location.protocol}</p>
                <p><strong>Host:</strong> ${window.location.host}</p>
                <p><strong>Port:</strong> ${window.location.port}</p>
                <p><strong>User Agent:</strong> ${navigator.userAgent}</p>
            `;
        }

        // Auto-run tests on page load
        window.onload = function() {
            displayNetworkInfo();
            updateStatus('Starting connection tests...', 'info');
            
            // Run tests with delays
            setTimeout(() => testDirectBackend(), 500);
            setTimeout(() => testFrontendProxy(), 1000);
            setTimeout(() => testCORSFromFrontend(), 1500);
        };
    </script>
</body>
</html>
