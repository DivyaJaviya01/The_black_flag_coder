<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vishal Collection Data Explorer</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
    .header { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
    .controls { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
    .control-group { display: flex; gap: 15px; margin-bottom: 15px; align-items: center; }
    input, select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
    button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0056b3; }
    .data-container { background: white; padding: 20px; border-radius: 8px; min-height: 300px; }
    .data-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
    .data-card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; }
    .data-title { font-weight: bold; color: #333; margin-bottom: 10px; }
    .json-view { background: #f8f8f8; padding: 15px; border-radius: 4px; white-space: pre-wrap; font-family: monospace; max-height: 400px; overflow-y: auto; }
    .error { color: red; background: #ffe6e6; padding: 15px; border-radius: 4px; }
    .loading { text-align: center; color: #666; padding: 50px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📊 Vishal Collection Explorer</h1>
    <p>Explore data from the Vishal collection with schema analysis</p>
  </div>
  
  <div class="controls">
    <div class="control-group">
      <label>Search:</label>
      <input type="text" id="search" placeholder="Search data...">
      
      <label>Limit:</label>
      <select id="limit">
        <option value="">All</option>
        <option value="5">5</option>
        <option value="10">10</option>
        <option value="25">25</option>
      </select>
      
      <button onclick="loadData()">Load Data</button>
      <button onclick="toggleView()">Toggle View</button>
    </div>
  </div>
  
  <div class="data-container" id="data-container">
    <p class="loading">Click "Load Data" to fetch data from the Vishal collection...</p>
  </div>

  <script>
    let currentData = [];
    let isJsonView = false;
    
    async function loadData() {
      const container = document.getElementById('data-container');
      container.innerHTML = '<p class="loading">Loading data...</p>';
      
      try {
        const search = document.getElementById('search').value;
        const limit = document.getElementById('limit').value;
        
        let url = 'http://localhost:3001/api/vishal';
        const params = new URLSearchParams();
        if (search) params.append('search', search);
        if (limit) params.append('limit', limit);
        if (params.toString()) url += '?' + params.toString();
        
        const response = await fetch(url);
        const result = await response.json();
        
        if (result.success) {
          currentData = result.data;
          displayData(result);
        } else {
          throw new Error(result.message);
        }
      } catch (error) {
        container.innerHTML = `<div class="error">Error: ${error.message}</div>`;
      }
    }
    
    function displayData(result) {
      const container = document.getElementById('data-container');
      
      if (result.data.length === 0) {
        container.innerHTML = '<p class="loading">No data found.</p>';
        return;
      }
      
      if (isJsonView) {
        container.innerHTML = `
          <h3>JSON Data (${result.count} records)</h3>
          <div class="json-view">${JSON.stringify(result.data, null, 2)}</div>
        `;
      } else {
        const cards = result.data.map(item => {
          const title = item.name || item.title || item._id || 'Untitled';
          const details = Object.entries(item)
            .filter(([key]) => key !== '_id' && key !== 'name' && key !== 'title')
            .map(([key, value]) => `<strong>${key}:</strong> ${typeof value === 'object' ? JSON.stringify(value) : value}`)
            .join('<br>');
          
          return `
            <div class="data-card">
              <div class="data-title">${title}</div>
              <div>${details || 'No additional data'}</div>
            </div>
          `;
        }).join('');
        
        container.innerHTML = `
          <h3>Data Results (${result.count} found)</h3>
          <div class="data-grid">${cards}</div>
        `;
      }
    }
    
    function toggleView() {
      isJsonView = !isJsonView;
      if (currentData.length > 0) {
        displayData({ data: currentData, count: currentData.length, success: true });
      }
    }
    
    document.getElementById('search').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loadData();
    });
  </script>
</body>
</html>

    @media (max-width: 768px) {
